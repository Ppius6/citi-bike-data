name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  # Manual retry always mints a fresh run ID with no prior artifact history —
  # unlike "Re-run failed jobs" on an existing run, which re-uploads into the
  # same run and can leave deploy-pages seeing duplicate "github-pages"
  # artifacts. Prefer this (or a new commit) over rerunning a failed
  # deploy-docs job.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --locked
      - run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --locked
      - run: uv run pytest tests/ -v

  test-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r agent/backend/requirements-dev.txt
      - run: pytest agent/backend/tests -v

  dbt-parse:
    runs-on: ubuntu-latest
    env:
      DB_PASSWORD: ci-placeholder
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --locked
      - name: dbt deps (dbt_utils, elementary — gitignored like node_modules)
        working-directory: dbt
        run: uv run --project .. dbt deps
      - name: dbt parse (validates refs, sources, Jinja, YAML schema)
        working-directory: dbt
        run: uv run --project .. dbt parse --profiles-dir . --target local

  # Builds the real bronze->silver->snapshot->gold schema against ephemeral,
  # empty Postgres/ClickHouse service containers (structure only, no real
  # trip data) purely so dbt docs generate can produce an accurate catalog.json
  # (column names/types), then publishes the static docs site to GitHub Pages.
  deploy-docs:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, test, dbt-parse]
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: citi-bike
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_admin_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd=pg_isready
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      # No custom users.xml here (service containers start before checkout,
      # so repo config isn't available to mount yet) — the vanilla image
      # enforces a random/protected default-user password without this,
      # unlike our local dev setup's blank-password users.xml.
      clickhouse:
        image: clickhouse/clickhouse-server:24.3
        env:
          CLICKHOUSE_SKIP_USER_SETUP: "1"
        ports:
          - 8123:8123
          - 9009:9000
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --locked
      - name: dbt deps (dbt_utils, elementary — gitignored like node_modules)
        working-directory: dbt
        run: uv run --project .. dbt deps

      - name: Wait for ClickHouse
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8123/ping && exit 0
            sleep 2
          done
          echo "ClickHouse did not become ready in time" >&2
          exit 1

      - name: Set up Postgres schema (bronze/silver/snapshots + roles)
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGPASSWORD: ci_admin_password
          POSTGRES_USER: postgres
          POSTGRES_DB: citi-bike
          DB_PASSWORD: ci_engineer_password
          ANALYST_PASSWORD: ci_analyst_password
        run: bash infra/postgres/init.sh

      # Runs in /tmp, not the checkout root: the installer downloads its
      # binary to a path literally named "clickhouse" in the current
      # directory, which would otherwise collide with our own clickhouse/
      # config directory and get `sudo mv`'d out of the checkout.
      # Pinned to match the clickhouse-server:24.3 image above exactly (both
      # clickhouse-client and clickhouse-common-static must be pinned
      # together — the client package depends on an exact-matching
      # common-static version, and apt otherwise pulls the newest one).
      # Bump both if the service image tag above changes.
      - name: Install clickhouse-client (pinned to match the server version)
        run: |
          sudo apt-get install -y apt-transport-https ca-certificates gnupg
          curl -fsSL 'https://packages.clickhouse.com/rpm/lts/repodata/repomd.xml.key' | sudo gpg --dearmor -o /usr/share/keyrings/clickhouse-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/clickhouse-keyring.gpg] https://packages.clickhouse.com/deb stable main" | sudo tee /etc/apt/sources.list.d/clickhouse.list
          sudo apt-get update
          sudo apt-get install -y clickhouse-client=24.3.18.7 clickhouse-common-static=24.3.18.7

      - name: Set up ClickHouse schema (users, databases, bridge tables)
        env:
          CLICKHOUSE_ENGINEER_PASSWORD: ci_engineer_password
          ANALYST_PASSWORD: ci_analyst_password
          AI_AGENT_PASSWORD: ci_agent_password
          # Baked into the bridge tables' ENGINE=PostgreSQL(...) connection
          # string, resolved later by the ClickHouse server itself over the
          # services' shared network — "postgres" is that service's name,
          # not reachable under that name from this runner step.
          DB_HOST: postgres
          DB_PORT: "5432"
          DB_NAME: citi-bike
          DB_PASSWORD: ci_engineer_password
        run: bash infra/clickhouse/init.sh

      - name: dbt run (bronze/silver/snapshot/elementary)
        working-directory: dbt
        env:
          DB_PASSWORD: ci_engineer_password
        run: |
          uv run --project .. dbt run --select bronze_trips int_trips_cleaned silver_trips silver_trips_rejected bronze_weather int_weather_cleaned silver_weather --target local --profiles-dir .
          uv run --project .. dbt snapshot --target local --profiles-dir .
          uv run --project .. dbt run --select elementary --target local --profiles-dir .

      - name: dbt run (gold)
        working-directory: dbt
        env:
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_ENGINEER_PASSWORD: ci_engineer_password
        run: uv run --project .. dbt run --select gold.* --target clickhouse --profiles-dir .

      # Elementary's test-results report only has data to show if a `dbt test`
      # invocation actually happened — `dbt run`/`dbt snapshot` alone leave its
      # test_results table empty. These run against empty, structure-only
      # tables (no real trip data in this ephemeral CI environment), so the
      # assertions themselves aren't meaningful monitoring — this step exists
      # purely so the published report has real invocation history to render.
      - name: dbt test (bronze/silver + gold)
        working-directory: dbt
        env:
          DB_PASSWORD: ci_engineer_password
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_ENGINEER_PASSWORD: ci_engineer_password
        run: |
          uv run --project .. dbt test --select bronze_trips int_trips_cleaned silver_trips silver_trips_rejected bronze_weather int_weather_cleaned silver_weather --target local --profiles-dir .
          uv run --project .. dbt test --select gold.* --target clickhouse --profiles-dir .

      # dbt docs generate only builds catalog.json (real column types) for
      # whichever single target/adapter it's pointed at — a lone run misses
      # half this project's models, since bronze/silver live in Postgres and
      # gold lives in ClickHouse. Generate against both and merge the two
      # catalogs so every model gets real column data in the published docs.
      - name: dbt docs generate (Postgres layer)
        working-directory: dbt
        env:
          DB_PASSWORD: ci_engineer_password
        run: |
          uv run --project .. dbt docs generate --target local --profiles-dir .
          cp target/catalog.json target/catalog_postgres.json

      - name: dbt docs generate (ClickHouse layer) + merge catalogs
        working-directory: dbt
        env:
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_ENGINEER_PASSWORD: ci_engineer_password
        run: |
          uv run --project .. dbt docs generate --target clickhouse --profiles-dir .
          uv run --project .. python -c "
          import json
          pg = json.load(open('target/catalog_postgres.json'))
          ch = json.load(open('target/catalog.json'))
          pg['nodes'].update(ch['nodes'])
          pg['sources'].update(ch['sources'])
          pg['errors'] = (pg.get('errors') or []) + (ch.get('errors') or [])
          json.dump(pg, open('target/catalog.json', 'w'))
          "
          rm target/catalog_postgres.json

      # Elementary's monitoring tables live in Postgres regardless of target;
      # edr doesn't create parent dirs for --file-path, so mkdir first.
      # Published into target/elementary/ so the same upload-pages-artifact
      # step below picks it up alongside dbt docs, reachable at /elementary/.
      - name: Generate Elementary report
        working-directory: dbt
        env:
          DB_PASSWORD: ci_engineer_password
        run: |
          mkdir -p target/elementary
          uv run --project .. edr report --profiles-dir . --project-dir . --profile-target local --file-path target/elementary/index.html --open-browser false

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dbt/target
      - uses: actions/deploy-pages@v4
        id: deployment
