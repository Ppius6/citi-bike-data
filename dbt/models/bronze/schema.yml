version: 2

sources:
  - name: bronze
    schema: bronze
    tables:
      - name: trips
        description: "Raw Citi Bike trip data loaded from MinIO Parquet files by loader.py"
        columns:
          - name: ride_id
            description: "Unique identifier for each ride"
          - name: rideable_type
            description: "Type of bike: electric_bike or classic_bike"
          - name: started_at
            description: "Ride start timestamp in UTC"
          - name: ended_at
            description: "Ride end timestamp in UTC"
          - name: start_station_name
            description: "Name of the departure station"
          - name: start_station_id
            description: "ID of the departure station"
          - name: end_station_name
            description: "Name of the arrival station"
          - name: end_station_id
            description: "ID of the arrival station"
          - name: start_lat
            description: "Latitude of the departure station"
          - name: start_lng
            description: "Longitude of the departure station"
          - name: end_lat
            description: "Latitude of the arrival station"
          - name: end_lng
            description: "Longitude of the arrival station"
          - name: member_casual
            description: "Rider type: member or casual"
          - name: _source_file
            description: "Name of the source CSV file this row came from"
          - name: _ingested_at
            description: "UTC timestamp when this row was ingested into MinIO"
      - name: weather
        description: "Raw hourly weather data from Open-Meteo API"
        columns:
          - name: observation_time
            description: "Hourly timestamp of the weather observation in UTC"
          - name: temperature_c
            description: "Temperature in Celsius"
          - name: precipitation_mm
            description: "Precipitation (rain/snow) in mm"
          - name: wind_speed_kmh
            description: "Wind speed in km/h"
          - name: weather_code
            description: "WMO Weather interpretation code"
          - name: is_daylight
            description: "True if it was daytime during this hour"
          - name: _ingested_at
            description: "UTC timestamp when this row was ingested"

models:
  - name: bronze_trips
    description: "Direct select from bronze.trips — the dbt entry point for the bronze layer"
    columns:
      - name: ride_id
        description: "Unique identifier for each ride"
        data_tests:
          - not_null
  - name: bronze_weather
    description: "Direct select from bronze.weather — the dbt entry point for weather data"
    columns:
      - name: observation_time
        description: "Hourly timestamp of the weather observation"
        data_tests:
          - not_null