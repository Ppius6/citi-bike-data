version: 2

sources:
  - name: silver
    schema: silver
    tables:
      - name: silver_trips
        description: "Bridge table — ClickHouse PostgreSQL engine reading from Postgres silver.silver_trips"

  - name: snapshots
    schema: snapshots
    tables:
      - name: station_snapshot
        description: "Bridge table — ClickHouse PostgreSQL engine reading from Postgres snapshots.station_snapshot"

models:
  - name: dim_date
    description: "Date dimension — every date from 2021-01-01 to today"
    columns:
      - name: date_key
        description: "Surrogate key — YYYYMMDD as UInt32 (e.g. 20230627), not a hash"
        data_tests:
          - not_null
          - unique
      - name: full_date
        description: "The actual date"
        data_tests:
          - not_null

  - name: dim_station
    description: "Station dimension with SCD Type 2 history"
    columns:
      - name: station_key
        description: >
          Surrogate key — one per SCD2 version (sourced from dbt_scd_id), not
          per station_id. A station with N attribute changes has N rows and
          N distinct station_keys.
        data_tests:
          - not_null
          - unique
      - name: station_id
        description: "Natural key from source. Not unique — repeats once per SCD2 version of the station."
        data_tests:
          - not_null

  - name: dim_rider_type
    description: "Rider type dimension — member or casual"
    columns:
      - name: rider_type_key
        description: "Surrogate key"
        data_tests:
          - not_null
          - unique
      - name: rider_type
        description: "Raw rider type value from source"
        data_tests:
          - accepted_values:
              arguments:
                values: ['member', 'casual']

  - name: dim_bike_type
    description: "Bike type dimension"
    columns:
      - name: bike_type_key
        description: "Surrogate key"
        data_tests:
          - not_null
          - unique
      - name: bike_type
        description: "Raw bike type value from source"
        data_tests:
          - accepted_values:
              arguments:
                values: ['classic_bike', 'electric_bike', 'docked_bike']

  - name: fact_trips
    description: "Fact table — one row per ride, FK references to all dimensions"
    columns:
      - name: trip_key
        description: "Surrogate key for the fact row"
        data_tests:
          - not_null
      - name: ride_id
        description: "Natural key from source"
        data_tests:
          - not_null
      - name: date_key
        description: "FK to dim_date, joined on the ride's start_date"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: start_station_key
        description: >
          FK to dim_station — the SCD2 version whose valid_from/valid_to
          window contains started_at, resolved via ASOF JOIN. Rides with no
          resolvable start station are excluded from fact_trips entirely
          (see the trips CTE), so this is always populated.
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_station')
              field: station_key
      - name: end_station_key
        description: "FK to dim_station, same point-in-time resolution and exclusion rule as start_station_key"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_station')
              field: station_key
      - name: rider_type_key
        description: "FK to dim_rider_type"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_rider_type')
              field: rider_type_key
      - name: bike_type_key
        description: "FK to dim_bike_type"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_bike_type')
              field: bike_type_key
      - name: ride_distance_km
        description: >
          Great-circle distance between start and end coordinates
          (ClickHouse geoDistance), rounded to 2 decimal places. Null when
          end_lat/end_lng are missing — an unknown endpoint means an
          unknown distance, not a data-quality failure.