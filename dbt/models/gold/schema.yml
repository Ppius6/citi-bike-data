version: 2

sources:
  - name: silver
    schema: silver
    tables:
      - name: silver_trips
        description: "Bridge table — ClickHouse PostgreSQL engine reading from Postgres silver.silver_trips"

  - name: snapshots
    schema: snapshots
    tables:
      - name: station_snapshot
        description: "Bridge table — ClickHouse PostgreSQL engine reading from Postgres snapshots.station_snapshot"

models:
  - name: dim_date
    description: "Date dimension — every date from 2021-01-01 to today"
    columns:
      - name: date_key
        description: "Surrogate key — YYYYMMDD as UInt32 (e.g. 20230627), not a hash"
        data_tests:
          - not_null
          - unique
      - name: full_date
        description: "The actual date"
        data_tests:
          - not_null
      - name: year
        description: "The year of the date"
      - name: month
        description: "The month of the date (1-12)"
      - name: day
        description: "The day of the month (1-31)"
      - name: quarter
        description: "The quarter of the year (1-4)"
      - name: week_of_year
        description: "The ISO week of the year"
      - name: day_of_week_num
        description: "The day of the week as a number (1-7, where 1 is Monday)"
      - name: day_name
        description: "The name of the day (e.g. Monday)"
      - name: month_name
        description: "The name of the month (e.g. January)"
      - name: is_weekend
        description: "1 if the date is a weekend (Saturday or Sunday), 0 otherwise"
      - name: season
        description: "The season of the year (Winter, Spring, Summer, Fall)"

  - name: dim_station
    description: "Station dimension with SCD Type 2 history"
    columns:
      - name: station_key
        description: >
          Surrogate key — one per SCD2 version (sourced from dbt_scd_id), not
          per station_id. A station with N attribute changes has N rows and
          N distinct station_keys.
        data_tests:
          - not_null
          - unique
      - name: station_id
        description: "Natural key from source. Not unique — repeats once per SCD2 version of the station."
        data_tests:
          - not_null
      - name: station_name
        description: "The name of the station"
      - name: latitude
        description: "The latitude coordinate of the station"
      - name: longitude
        description: "The longitude coordinate of the station"
      - name: valid_from
        description: "The start timestamp when this version of the station became active"
      - name: valid_to
        description: "The end timestamp when this version of the station was replaced, or null if current"
      - name: is_current
        description: "True if this is the currently active version of the station"

  - name: dim_rider_type
    description: "Rider type dimension — member or casual"
    columns:
      - name: rider_type_key
        description: "Surrogate key"
        data_tests:
          - not_null
          - unique
      - name: rider_type
        description: "Raw rider type value from source"
        data_tests:
          - accepted_values:
              arguments:
                values: ['member', 'casual']
      - name: rider_type_desc
        description: "Human-readable description of the rider type (e.g. Member, Casual)"

  - name: dim_bike_type
    description: "Bike type dimension"
    columns:
      - name: bike_type_key
        description: "Surrogate key"
        data_tests:
          - not_null
          - unique
      - name: bike_type
        description: "Raw bike type value from source"
        data_tests:
          - accepted_values:
              arguments:
                values: ['classic_bike', 'electric_bike', 'docked_bike']
      - name: bike_type_desc
        description: "Human-readable description of the bike type (e.g. Classic Bike, Electric Bike)"

  - name: fact_trips
    description: "Fact table — one row per ride, FK references to all dimensions"
    columns:
      - name: trip_key
        description: "Surrogate key for the fact row"
        data_tests:
          - not_null
      - name: ride_id
        description: "Natural key from source"
        data_tests:
          - not_null
      - name: date_key
        description: "FK to dim_date, joined on the ride's start_date"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: start_station_key
        description: >
          FK to dim_station — the SCD2 version whose valid_from/valid_to
          window contains started_at, resolved via ASOF JOIN. Rides with no
          resolvable start station are excluded from fact_trips entirely
          (see the trips CTE), so this is always populated.
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_station')
              field: station_key
      - name: end_station_key
        description: "FK to dim_station, same point-in-time resolution and exclusion rule as start_station_key"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_station')
              field: station_key
      - name: rider_type_key
        description: "FK to dim_rider_type"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_rider_type')
              field: rider_type_key
      - name: bike_type_key
        description: "FK to dim_bike_type"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_bike_type')
              field: bike_type_key
      - name: ride_distance_km
        description: >
          Great-circle distance between start and end coordinates
          (ClickHouse geoDistance), rounded to 2 decimal places. Null when
          end_lat/end_lng are missing — an unknown endpoint means an
          unknown distance, not a data-quality failure.
      - name: started_at
        description: "The timestamp when the ride started (America/New_York timezone)"
      - name: ended_at
        description: "The timestamp when the ride ended (America/New_York timezone)"
      - name: ride_duration_minutes
        description: "The duration of the ride in minutes"
      - name: start_lat
        description: "The latitude coordinate where the ride started"
      - name: start_lng
        description: "The longitude coordinate where the ride started"
      - name: end_lat
        description: "The latitude coordinate where the ride ended"
      - name: end_lng
        description: "The longitude coordinate where the ride ended"
      - name: _source_file
        description: "The raw source file this record was ingested from"
      - name: _ingested_at
        description: "The timestamp when this record was ingested into the system"