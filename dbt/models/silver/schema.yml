version: 2

models:
  - name: silver_trips
    description: >
      Cleaned, deduplicated, and typed Citi Bike trip data.
      Timezone converted to America/New_York.
      Rides with invalid durations or missing coordinates are excluded.
    config:
      elementary:
        timestamp_column: started_at
    columns:
      - name: ride_id
        description: "Unique identifier for each ride"
        data_tests:
          - not_null
          - unique
          - elementary.column_anomalies:
              column_anomalies:
                - null_count
                - null_percent
              # ride_id is enforced not_null/unique, so this metric is a
              # constant 0 — anomaly detection has no real baseline to learn
              # from yet. Warn instead of failing until enough run history
              # builds up to revisit this check.
              config:
                severity: warn
      - name: rideable_type
        description: "Type of bike"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['electric_bike', 'classic_bike', 'docked_bike']
      - name: started_at
        description: "Ride start timestamp in America/New_York timezone"
        data_tests:
          - not_null
      - name: ended_at
        description: "Ride end timestamp in America/New_York timezone"
        data_tests:
          - not_null
      - name: start_date
        description: "Date of ride start, derived from started_at"
      - name: start_hour
        description: "Hour of ride start (0-23), derived from started_at"
      - name: day_of_week
        description: "Day of week name, derived from started_at"
      - name: ride_duration_minutes
        description: "Duration of ride in minutes, rounded to 2 decimal places"
        data_tests:
          - not_null
      - name: start_station_name
        description: "Name of departure station, null if missing or blank"
      - name: start_station_id
        description: "ID of departure station, null if missing or blank"
      - name: end_station_name
        description: "Name of arrival station, null if missing or blank"
      - name: end_station_id
        description: "ID of arrival station, null if missing or blank"
      - name: start_lat
        description: "Latitude of departure station"
        data_tests:
          - not_null
      - name: start_lng
        description: "Longitude of departure station"
        data_tests:
          - not_null
      - name: member_casual
        description: "Rider type"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['member', 'casual']
      - name: _source_file
        description: "Source CSV filename this row originated from"
      - name: _ingested_at
        description: "UTC timestamp when this row was ingested into MinIO"
