services:
  minio:
    image: minio/minio:latest
    container_name: citibike-minio
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: citibike-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      DB_PASSWORD: ${DB_PASSWORD}
      ANALYST_PASSWORD: ${ANALYST_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
      image: clickhouse/clickhouse-server:24.3
      container_name: citibike-clickhouse
      env_file: .env
      environment:
        CLICKHOUSE_ENGINEER_PASSWORD: ${CLICKHOUSE_ENGINEER_PASSWORD}
        ANALYST_PASSWORD: ${ANALYST_PASSWORD}
        AI_AGENT_PASSWORD: ${AI_AGENT_PASSWORD}
        # Needed by init.sh to create the silver_trips/station_snapshot bridge
        # tables (ClickHouse's PostgreSQL engine) — not otherwise required to
        # be in .env, so set explicitly rather than assuming it's there.
        DB_HOST: postgres
        DB_PORT: 5432
      ports:
        - "8123:8123"
        - "9009:9009"
      volumes:
        - clickhouse_data:/var/lib/clickhouse
        - ./infra/clickhouse/config.xml:/etc/clickhouse-server/config.d/config.xml
        - ./infra/clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml
        - ./infra/clickhouse/init.sh:/docker-entrypoint-initdb.d/init.sh
      healthcheck:
        test: ["CMD", "clickhouse-client", "--port", "9009", "--query", "SELECT 1"]
        interval: 10s
        timeout: 5s
        retries: 5
      depends_on:
        postgres:
          condition: service_healthy

  agent-api:
    build:
      context: ./agent/backend
    container_name: citibike-agent-api
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_HTTP_PORT: 8123
      AI_AGENT_PASSWORD: ${AI_AGENT_PASSWORD}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      clickhouse:
        condition: service_healthy

  web:
    build:
      context: ./agent/frontend
    container_name: citibike-web
    ports:
      - "3000:80"
    depends_on:
      - agent-api

  pipeline:
    build: .
    container_name: citibike-pipeline
    env_file: .env
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy

  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: citibike-prefect
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_SERVER_DATABASE_CONNECTION_URL: "sqlite+aiosqlite:////root/.prefect/prefect.db"
    volumes:
      - prefect_data:/root/.prefect
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  prefect-worker:
    build: .    # Uses the Dockerfile, not prefect image
    container_name: citibike-prefect-worker
    command: prefect worker start --pool 'local-pool'
    env_file: .env
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      DB_HOST: postgres
      DB_PORT: 5432
      DBT_PROFILES_DIR: /app/dbt
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_ENGINEER_PASSWORD: ${CLICKHOUSE_ENGINEER_PASSWORD}
    volumes:
      - .:/app # Mounts full project so dbt files are accessible
    working_dir: /app
    depends_on:
      prefect-server:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  minio-init:
    image: minio/mc:latest
    container_name: citibike-minio-init
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_ANALYST_KEY: ${MINIO_ANALYST_KEY}
      MINIO_ANALYST_SECRET: ${MINIO_ANALYST_SECRET}
    volumes:
      - ./infra/minio/init.sh:/init.sh
    entrypoint: /bin/sh /init.sh
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure

volumes:
  minio_data:
  postgres_data:
  clickhouse_data:
  prefect_data: