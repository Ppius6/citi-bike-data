services:
  minio:
    image: minio/minio:latest
    container_name: citibike-minio
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: citibike-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      DB_PASSWORD: ${DB_PASSWORD}
      ANALYST_PASSWORD: ${ANALYST_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/sql/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
      image: clickhouse/clickhouse-server:24.3
      container_name: citibike-clickhouse
      ports:
        - "8123:8123"
        - "9009:9009"
      volumes:
        - clickhouse_data:/var/lib/clickhouse
        - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/config.xml
        - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml
        - ./clickhouse/init.sh:/docker-entrypoint-initdb.d/init.sh
      healthcheck:
        test: ["CMD", "clickhouse-client", "--port", "9009", "--query", "SELECT 1"]
        interval: 10s
        timeout: 5s
        retries: 5
      depends_on:
        postgres:
          condition: service_healthy

  pipeline:
    build: .
    container_name: citibike-pipeline
    env_file: .env
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy

  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: citibike-prefect
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_SERVER_DATABASE_CONNECTION_URL: "sqlite+aiosqlite:////root/.prefect/prefect.db"
    volumes:
      - prefect_data:/root/.prefect
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  prefect-worker:
    build: .    # Uses the Dockerfile, not prefect image
    container_name: citibike-prefect-worker
    command: prefect worker start --pool 'local-pool'
    env_file: .env
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      DB_HOST: postgres
      DB_PORT: 5432
      DBT_PROFILES_DIR: /app/dbt
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_ENGINEER_PASSWORD: ${CLICKHOUSE_ENGINEER_PASSWORD}
    volumes:
      - .:/app # Mounts full project so dbt files are accessible
    working_dir: /app
    depends_on:
      prefect-server:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    
  elasticsearch:
      image: elasticsearch:7.16.3
      container_name: citibike-elasticsearch
      environment:
        - discovery.type=single-node
        - xpack.security.enabled=false
        - ES_JAVA_OPTS=-Xms512m -Xmx512m
      ports:
        - "9200:9200"
      volumes:
        - elasticsearch_data:/usr/share/elasticsearch/data
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
        interval: 10s
        timeout: 5s
        retries: 5

  openmetadata:
    image: openmetadata/server:1.5.0
    container_name: citibike-openmetadata
    ports:
      - "8585:8585"
      - "8586:8586"
    environment:
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_USER_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      OM_DATABASE: openmetadata_db
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_SCHEME: http
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  minio-init:
    image: minio/mc:latest
    container_name: citibike-minio-init
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_ANALYST_KEY: ${MINIO_ANALYST_KEY}
      MINIO_ANALYST_SECRET: ${MINIO_ANALYST_SECRET}
    volumes:
      - ./scripts/minio/init.sh:/init.sh
    entrypoint: /bin/sh /init.sh
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure

volumes:
  minio_data:
  postgres_data:
  clickhouse_data:
  prefect_data:
  elasticsearch_data: