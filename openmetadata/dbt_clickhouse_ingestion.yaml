source:
  type: dbt
  serviceName: citi-bike-clickhouse
  sourceConfig:
    config:
      type: DBT
      dbtConfigSource:
        dbtConfigType: local
        dbtCatalogFilePath: /opt/dbt/target/catalog.json
        dbtManifestFilePath: /opt/dbt/target/manifest_clean.json
        dbtRunResultsFilePath: /opt/dbt/target/run_results.json
      dbtUpdateDescriptions: true
      includeTags: true

sink:
  type: metadata-rest
  config: {}

workflowConfig:
  openMetadataServerConfig:
    hostPort: http://openmetadata:8585/api
    authProvider: openmetadata
    securityConfig:
      jwtToken: "${OPENMETADATA_JWT_TOKEN}"