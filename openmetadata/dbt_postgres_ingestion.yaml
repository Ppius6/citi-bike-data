source:
  type: dbt
  serviceName: citi-bike-postgres
  sourceConfig:
    config:
      type: DBT
      dbtConfigSource:
        dbtConfigType: local
        dbtCatalogFilePath: /opt/ingestion/config/dbt-artifacts/catalog.json
        dbtManifestFilePath: /opt/ingestion/config/dbt-artifacts/postgres/manifest.json
      dbtUpdateDescriptions: true
      includeTags: true

sink:
  type: metadata-rest
  config: {}

workflowConfig:
  openMetadataServerConfig:
    hostPort: http://openmetadata:8585/api
    authProvider: openmetadata
    securityConfig:
      jwtToken: "${OPENMETADATA_JWT_TOKEN}"
