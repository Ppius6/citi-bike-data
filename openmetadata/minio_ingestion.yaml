source:
  type: s3
  serviceName: citi-bike-minio
  serviceConnection:
    config:
      type: S3
      awsConfig:
        awsAccessKeyId: "${MINIO_ACCESS_KEY}"
        awsSecretAccessKey: "${MINIO_SECRET_KEY}"
        awsRegion: us-east-1
        endPointURL: http://minio:9000
  sourceConfig:
    config:
      type: StorageMetadata

sink:
  type: metadata-rest
  config: {}

workflowConfig:
  openMetadataServerConfig:
    hostPort: http://openmetadata:8585/api
    authProvider: openmetadata
    securityConfig:
      jwtToken: "${OPENMETADATA_JWT_TOKEN}"