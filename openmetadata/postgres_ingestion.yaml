source:
  type: postgres
  serviceName: citi-bike-postgres
  serviceConnection:
    config:
      type: Postgres
      username: postgres
      authType:
        password: "${POSTGRES_ADMIN_PASSWORD}"
      hostPort: postgres:5432
      database: citi-bike
  sourceConfig:
    config:
      type: DatabaseMetadata
      schemaFilterPattern:
        includes:
          - bronze
          - silver
          - snapshots
sink:
  type: metadata-rest
  config: {}
workflowConfig:
  openMetadataServerConfig:
    hostPort: http://openmetadata:8585/api
    authProvider: openmetadata
    securityConfig:
      jwtToken: "${OPENMETADATA_JWT_TOKEN}"